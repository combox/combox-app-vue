name: Build and Push Docker image (Docker Hub)

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag to publish (e.g. v1.2.3)
        required: true
        type: string
      push_latest:
        description: Also push :latest
        required: false
        default: false
        type: boolean
      combox_api_version:
        description: combox-api npm version to bake into the image (e.g. 0.1.0 or latest)
        required: false
        default: latest
        type: string

permissions:
  contents: write
  packages: write

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/combox-app-vue
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/combox-app-vue

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: combox-app-vue

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            PUSH_LATEST=true
            API_VERSION="latest"
          else
            TAG="${{ inputs.tag }}"
            PUSH_LATEST="${{ inputs.push_latest }}"
            API_VERSION="${{ inputs.combox_api_version }}"
          fi

          TAGS="${DOCKERHUB_IMAGE}:${TAG},${GHCR_IMAGE}:${TAG}"
          if [[ "${PUSH_LATEST}" == "true" ]]; then
            TAGS="${TAGS},${DOCKERHUB_IMAGE}:latest,${GHCR_IMAGE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

          echo "primary_tag=${DOCKERHUB_IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "api_version=${API_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: combox-app-vue
          file: combox-app-vue/Dockerfile
          build-args: |
            COMBOX_API_VERSION=${{ steps.meta.outputs.api_version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write image metadata (release)
        if: ${{ github.event_name == 'release' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          {
            echo "dockerhub_image=${DOCKERHUB_IMAGE}"
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "tags=${{ steps.meta.outputs.tags }}"
            echo "primary_tag=${{ steps.meta.outputs.primary_tag }}"
            echo "digest=${{ steps.build.outputs.digest }}"
            echo "pulled_as=${{ steps.meta.outputs.primary_tag }}@${{ steps.build.outputs.digest }}"
          } > dist/docker-image.txt

      - name: Upload metadata to GitHub Release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/docker-image.txt

      - name: Update GitHub Release notes with Docker pull snippet
        if: ${{ github.event_name == 'release' }}
        uses: actions/github-script@v7
        env:
          DOCKERHUB_URL: https://hub.docker.com/r/${{ env.DOCKERHUB_IMAGE }}
          GHCR_URL: https://github.com/orgs/${{ github.repository_owner }}/packages/container/package/combox-app-vue
        with:
          script: |
            const release = context.payload.release;
            const primaryTag = `${{ steps.meta.outputs.primary_tag }}`;
            const digest = `${{ steps.build.outputs.digest }}`;
            const dockerHubUrl = process.env.DOCKERHUB_URL;
            const ghcrUrl = process.env.GHCR_URL;
            const ghcrPull = `${{ env.GHCR_IMAGE }}:${{ github.event.release.tag_name }}`;

            const snippet = [
              "\n\n---\n\n## Docker image\n",
              `Docker Hub: ${dockerHubUrl}\n`,
              `GHCR: ${ghcrUrl}\n`,
              "\nPull:\n",
              "```bash\n",
              `docker pull ${primaryTag}\n`,
              `docker pull ${ghcrPull}\n`,
              "```\n",
              "\nPull by digest (immutable):\n",
              "```bash\n",
              `docker pull ${primaryTag}@${digest}\n`,
              "```\n",
            ].join("");

            const body = (release.body || "") + snippet;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body,
            });
