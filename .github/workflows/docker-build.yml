name: Docker Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: combox-app-vue

      - name: Checkout API dependency
        uses: actions/checkout@v4
        with:
          repository: combox/combox-api
          path: combox-api

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: combox-app-vue
          file: combox-app-vue/Dockerfile
          build-contexts: |
            combox_api=./combox-api
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/combox/combox-app-vue:latest
            ghcr.io/combox/combox-app-vue:${{ github.sha }}
