name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: combox-app-vue

      - name: Validate API checkout token
        run: |
          if [ -z "${{ secrets.CI_REPO_ACCESS_TOKEN }}" ]; then
            echo "Missing required secret: CI_REPO_ACCESS_TOKEN"
            echo "Create a fine-grained PAT or GitHub App token with read access to combox/combox-api."
            exit 1
          fi

      - name: Checkout local API dependency
        uses: actions/checkout@v4
        with:
          repository: combox/combox-api
          path: combox-api
          token: ${{ secrets.CI_REPO_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            combox-app-vue/package-lock.json
            combox-api/package-lock.json

      - name: Install API dependency
        working-directory: combox-api
        run: npm ci

      - name: npm audit API dependency
        working-directory: combox-api
        run: npm audit --audit-level=high

      - name: Install app
        working-directory: combox-app-vue
        run: npm ci

      - name: npm audit app
        working-directory: combox-app-vue
        run: npm audit --audit-level=high

  codeql:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: combox-app-vue

      - name: Validate API checkout token
        run: |
          if [ -z "${{ secrets.CI_REPO_ACCESS_TOKEN }}" ]; then
            echo "Missing required secret: CI_REPO_ACCESS_TOKEN"
            echo "Create a fine-grained PAT or GitHub App token with read access to combox/combox-api."
            exit 1
          fi

      - name: Checkout local API dependency
        uses: actions/checkout@v4
        with:
          repository: combox/combox-api
          path: combox-api
          token: ${{ secrets.CI_REPO_ACCESS_TOKEN }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            combox-app-vue/package-lock.json
            combox-api/package-lock.json

      - name: Install API dependency
        working-directory: combox-api
        run: npm ci

      - name: Build API dependency
        working-directory: combox-api
        run: npm run build

      - name: Install app
        working-directory: combox-app-vue
        run: npm ci

      - name: Build app
        working-directory: combox-app-vue
        run: npm run build

      - name: Analyze
        uses: github/codeql-action/analyze@v4
