name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: combox-app-vue

      - name: Checkout local API dependency
        uses: actions/checkout@v4
        with:
          repository: combox/combox-api
          path: combox-api

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            combox-app-vue/package-lock.json
            combox-api/package-lock.json

      - name: Install API dependency
        working-directory: combox-api
        run: npm ci

      - name: npm audit API dependency
        working-directory: combox-api
        run: npm audit --audit-level=high

      - name: Install app
        working-directory: combox-app-vue
        run: npm ci

      - name: npm audit app
        working-directory: combox-app-vue
        run: npm audit --audit-level=high
