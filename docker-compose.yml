services:
  combox-app:
    build:
      context: .
      additional_contexts:
        combox_api: ../combox-api
      target: dev
    container_name: combox-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4173}:4173"
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  combox-app-e2e:
    build:
      context: .
      additional_contexts:
        combox_api: ../combox-api
      target: e2e
    container_name: combox-app-e2e
    profiles: ["e2e"]
    depends_on:
      combox-app:
        condition: service_healthy
    environment:
      - PLAYWRIGHT_BASE_URL=http://combox-app:4173
    command: ["npm", "run", "test:e2e"]
